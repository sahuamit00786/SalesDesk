<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Meeting Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      width: 280px;
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
      width: 100%;
    }
    h3 { font-size: 14px; font-weight: 600; color: #f8fafc; }
    #sub { font-size: 11px; color: #64748b; min-height: 14px; }
    .dot {
      width: 10px; height: 10px;
      background: #dc2626;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .btn {
      padding: 9px 0;
      width: 100%;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    #startBtn { background: #6366f1; color: #fff; }
    #stopBtn  { background: #dc2626; color: #fff; display: none; }
    #errMsg   { font-size: 11px; color: #f87171; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h3 id="title">Meeting Recorder</h3>
    <div id="sub">Preparing streams…</div>
    <button id="startBtn" class="btn" disabled>Start Recording</button>
    <button id="stopBtn"  class="btn">Stop &amp; Save</button>
    <div id="errMsg"></div>
  </div>
  <script src="recorder.js"></script>
</body>
</html>
